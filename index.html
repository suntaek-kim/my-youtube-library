<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 유튜브 서재</title>

  <!-- ============================================
       PWA (홈 화면 설치 / 오프라인 캐싱)
       경로는 상대경로 — 도메인이 바뀌어도 작동
       ============================================ -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1c1917">

  <!-- iOS Safari 홈 화면 앱 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyCuration">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <!-- Favicon (탭 아이콘) -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <!-- Service Worker 등록 (오프라인 캐싱) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW 등록됨:', reg.scope))
          .catch(err => console.error('SW 등록 실패:', err));
      });
    }
  </script>

  <!-- Pretendard Variable (Wanted 디자인 시스템 표준 폰트) -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <!-- 외부 스타일시트 -->
  <link rel="stylesheet" href="style.css">

  <!-- Supabase JS 라이브러리 (createClient 함수를 window.supabase로 제공) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 우리 스크립트 (defer: HTML 파싱 후 문서 순서대로 실행)
       site-config.js와 supabase-client.js가 반드시 script.js보다 먼저 와야 함 -->
  <script src="site-config.js" defer></script>
  <script src="supabase-client.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <div class="page">

    <!-- ============================================
         헤더: 사이트 제목 + 메타 줄
         ============================================ -->
    <header class="masthead">
      <div class="eyebrow">
        <em>A Personal Curation</em>
        <span class="dot">·</span>
        <em>Est. 2026</em>
      </div>
      <h1 class="title">나의 유튜브 <span class="accent">서재</span></h1>
      <p class="subtitle">내가 사랑하는 영상들을 한 권의 책처럼 모아두는 곳</p>
      <!-- 메타 줄 (영상 개수는 JS가 채움) -->
      <div class="meta-row" id="metaRow"></div>
    </header>

    <!-- ============================================
         검색창 (실시간 필터링, 200ms 디바운스)
         좌측: 돋보기 SVG (장식)
         우측: X 버튼 (입력값 있을 때만 표시)
         ============================================ -->
    <div class="search-wrapper" id="searchWrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="searchInput"
             placeholder="영상 제목, 채널, 코멘트로 검색..." autocomplete="off">
      <button class="search-clear" id="searchClear" type="button"
              aria-label="검색 초기화" title="검색 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- ============================================
         카테고리 네비게이션 (JS로 동적 생성)
         ============================================ -->
    <nav class="categories" id="categories" role="tablist" aria-label="카테고리">
      <!-- script.js의 renderCategories()에서 채움 -->
    </nav>

    <!-- ============================================
         메인: 영상 카드 그리드 + 빈 상태 메시지
         ============================================ -->
    <main>
      <div class="video-grid" id="videoGrid">
        <!-- script.js의 renderVideos()에서 채움 -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        이 책장은 아직 비어있어요. 첫 번째 영상을 더해보세요.
      </div>
    </main>

    <!-- ============================================
         푸터 (장식적 마무리)
         ============================================ -->
    <footer class="footnote">
      <em>End of Shelf One</em>
      <span class="ornament">❦</span>
      <em>More to come</em>
    </footer>

  </div>

  <!-- ============================================
       헤더 우측 인증 컨트롤 (항상 표시)
       비로그인: 회원가입/로그인 버튼
       로그인:   도구 그룹 + 사용자 배지
       ============================================ -->
  <div class="admin-controls">
    <!-- 비로그인 시: 회원가입/로그인 버튼 -->
    <button type="button" class="auth-trigger-btn" id="authTriggerBtn">로그인 / 회원가입</button>

    <!-- 로그인 시: 도구 그룹 (내보내기 / 가져오기) -->
    <div class="admin-tools" id="adminTools">
      <button type="button" class="admin-tool-btn" id="exportBtn" title="JSON으로 내보내기">
        <span class="emoji" aria-hidden="true">📤</span>
        <span class="label">내보내기</span>
        <!-- 영상 10개 이상이면 .show 클래스로 표시 (백업 권장) -->
        <span class="backup-dot" id="backupDot" aria-hidden="true"></span>
      </button>
      <button type="button" class="admin-tool-btn" id="importBtn" title="JSON 가져오기">
        <span class="emoji" aria-hidden="true">📥</span>
        <span class="label">가져오기</span>
      </button>
      <!-- 숨김 file input (importBtn 클릭 시 트리거) -->
      <input type="file" id="importFileInput" accept=".json,application/json" hidden>
    </div>

    <!-- 로그인 시: 사용자 정보 배지 -->
    <div class="admin-badge" id="userBadge">
      <span class="admin-badge-icon" aria-hidden="true">👤</span>
      <span class="user-greeting">안녕하세요, <strong id="userName"></strong>님</span>
      <span class="admin-badge-divider" aria-hidden="true">|</span>
      <button type="button" class="admin-badge-logout" id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <!-- 새 영상 추가용 떠다니는 + 버튼 (FAB) -->
  <button class="add-fab" id="addFab" aria-label="새 영상 추가" title="새 영상 추가">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ============================================
       추가/편집 모달
       ============================================ -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 class="modal-title" id="modalTitle">새 영상 더하기</h2>
      <p class="modal-subtitle">서재에 한 권을 더해주세요</p>

      <!-- 유튜브 URL (blur 시 oEmbed로 제목 자동 채움) -->
      <div class="form-group">
        <label for="urlInput">유튜브 URL</label>
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
        <div class="hint">유튜브 영상 주소를 그대로 붙여넣으세요</div>
      </div>

      <div class="form-group">
        <label for="titleInput">제목</label>
        <input type="text" id="titleInput" placeholder="영상 제목">
      </div>

      <div class="form-group">
        <label for="channelInput">채널명</label>
        <input type="text" id="channelInput" placeholder="채널명">
      </div>

      <!-- 카테고리: 기존 목록은 datalist로 자동완성 -->
      <div class="form-group">
        <label for="categoryInput">카테고리</label>
        <input type="text" id="categoryInput" placeholder="예: 음악, 다큐, 강연, 일상..." list="categoryList">
        <datalist id="categoryList"></datalist>
        <div class="hint">새 카테고리를 입력하거나 기존 카테고리 선택</div>
      </div>

      <div class="form-group">
        <label for="noteInput">왜 이 영상을 골랐나요?</label>
        <textarea id="noteInput" placeholder="이 영상을 추천하는 이유, 인상 깊었던 부분, 나만의 코멘트..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn" id="cancelBtn">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <!-- ============================================
       인증 모달 (로그인 / 회원가입)
       헤더의 '회원가입 / 로그인' 버튼으로 열림
       ============================================ -->
  <div class="modal-backdrop" id="authModalBackdrop">
    <div class="modal">
      <!-- 로그인 / 회원가입 탭 -->
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="loginTab">로그인</button>
        <button type="button" class="auth-tab" id="signupTab">회원가입</button>
      </div>

      <div class="form-group">
        <label for="authEmail">이메일</label>
        <input type="email" id="authEmail" placeholder="you@example.com"
               autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="authPassword">비밀번호</label>
        <input type="password" id="authPassword" placeholder="6자 이상"
               autocomplete="current-password" minlength="6" required>
      </div>

      <!-- 회원가입 모드에서만 보임 (JS가 display 토글) -->
      <div class="form-group" id="authConfirmGroup" style="display:none;">
        <label for="authPasswordConfirm">비밀번호 확인</label>
        <input type="password" id="authPasswordConfirm" placeholder="비밀번호를 다시 입력"
               autocomplete="new-password">
      </div>

      <div class="error-message" id="authError"></div>

      <div class="modal-actions">
        <button type="button" class="btn" id="authCancelBtn">취소</button>
        <button type="button" class="btn btn-primary" id="authSubmitBtn">로그인</button>
      </div>
    </div>
  </div>

  <!-- ============================================
       가져오기 미리보기 모달
       JSON 파일 선택 시 영상 개수 보여주고 처리 방식 선택
       ============================================ -->
  <div class="modal-backdrop" id="importModalBackdrop">
    <div class="modal">
      <h2 class="modal-title">데이터 가져오기</h2>
      <p class="modal-subtitle">파일 내용을 확인해주세요</p>

      <div class="form-group">
        <div class="import-summary" id="importSummary"></div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn" id="importCancelBtn">취소</button>
        <button type="button" class="btn" id="importMergeBtn">병합</button>
        <button type="button" class="btn btn-warning" id="importReplaceBtn">덮어쓰기</button>
      </div>
    </div>
  </div>

  <!-- ============================================
       토스트 알림 컨테이너
       실시간 변경 알림(showToast)이 여기에 세로로 쌓임
       ============================================ -->
  <div class="toast-container" id="toastContainer"></div>

</body>
</html>
